name: ci

on:
  push:
  pull_request:

jobs:
  typecheck:
    name: typecheck snippets extracted from skill/*.md
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: verify
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: verify/package-lock.json
      - run: npm ci
      - run: npm run check   # extracts ```ts blocks from skill/*.md, then tsc --noEmit

  install-test:
    name: install.sh smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: install into a temp dir and assert layout
        run: |
          set -euo pipefail
          TMP="$(mktemp -d)"
          CLAUDE_DIR="$TMP" ./install.sh
          test -f "$TMP/skills/solana-tx-sre/SKILL.md"
          test -d "$TMP/skills/solana-tx-sre/playbooks"
          test -d "$TMP/skills/solana-tx-sre/rules"
          test -f "$TMP/skills/solana-tx-sre/examples/validation-live-mainnet.md"
          test -f "$TMP/commands/reliability-audit.md"
          test -f "$TMP/agents/tx-sre-engineer.md"
          test "$(find "$TMP" -name '*.md' | wc -l)" -ge 20
          echo "install.sh layout OK"
